<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DataPulse Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #0f1117; color: #e1e4e8;
            padding: 32px; max-width: 900px; margin: 0 auto;
        }
        h1 { font-size: 22px; margin-bottom: 24px; }
        .score-box {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 12px; padding: 32px; text-align: center;
            margin-bottom: 24px;
        }
        .score { font-size: 72px; font-weight: bold; }
        .good { color: #3fb950; }
        .warn { color: #d29922; }
        .bad { color: #f85149; }
        .score-label { color: #8b949e; margin-top: 8px; }
        .stats {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; margin-bottom: 24px;
        }
        .stat {
            background: #161b22; border: 1px solid #30363d;
            border-radius: 8px; padding: 16px; text-align: center;
        }
        .stat-num { font-size: 28px; font-weight: bold; }
        .stat-label { color: #8b949e; font-size: 13px; margin-top: 4px; }
        table {
            width: 100%; border-collapse: collapse;
            background: #161b22; border: 1px solid #30363d;
            border-radius: 8px; overflow: hidden;
        }
        th {
            text-align: left; padding: 12px 16px; color: #8b949e;
            font-size: 12px; text-transform: uppercase;
            border-bottom: 1px solid #30363d;
        }
        td {
            padding: 10px 16px; border-bottom: 1px solid #21262d;
            font-size: 14px;
        }
        .pass { color: #3fb950; font-weight: 600; }
        .fail { color: #f85149; font-weight: 600; }
    </style>
</head>
<body>
    <h1>Data-Pulse Dashboard</h1>

    <div class="score-box">
        <div id="score" class="score">...</div>
        <div class="score-label">Pipeline Health Score</div>
    </div>

    <div class="stats">
        <div class="stat">
            <div id="total" class="stat-num">-</div>
            <div class="stat-label">Total Checks</div>
        </div>
        <div class="stat">
            <div id="passed" class="stat-num" style="color:#3fb950">-</div>
            <div class="stat-label">Passed</div>
        </div>
        <div class="stat">
            <div id="failed" class="stat-num" style="color:#f85149">-</div>
            <div class="stat-label">Failed</div>
        </div>
        <div class="stat">
            <div id="critical" class="stat-num" style="color:#f85149">-</div>
            <div class="stat-label">Critical</div>
        </div>
    </div>

    <table>
        <thead>
            <tr><th>Status</th><th>Check</th><th>Source</th><th>Severity</th><th>Details</th></tr>
        </thead>
        <tbody id="rows">
            <tr><td colspan="5" style="text-align:center;color:#8b949e;padding:24px">Loading...</td></tr>
        </tbody>
    </table>

    <script>
    async function load() {
        const h = await (await fetch("/api/health")).json();
        const el = document.getElementById("score");
        el.textContent = h.health_score + "%";
        el.className = "score " + (h.health_score >= 80 ? "good" : h.health_score >= 50 ? "warn" : "bad");
        document.getElementById("total").textContent = h.total;
        document.getElementById("passed").textContent = h.passed;
        document.getElementById("failed").textContent = h.failed;
        document.getElementById("critical").textContent = h.critical_failures;

        const r = await (await fetch("/api/results?limit=30")).json();
        document.getElementById("rows").innerHTML = r.results.map(x =>
            "<tr>" +
            "<td class='" + (x.passed ? "pass" : "fail") + "'>" + (x.passed ? "PASS" : "FAIL") + "</td>" +
            "<td>" + x.check_name + "</td>" +
            "<td>" + x.source.split("/").pop() + "</td>" +
            "<td>" + x.severity.toUpperCase() + "</td>" +
            "<td style='color:#8b949e;font-size:13px'>" + x.details + "</td>" +
            "</tr>"
        ).join("");
    }
    load();
    setInterval(load, 30000);
    </script>
</body>
</html>
